<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocOnDemand | Panel Principal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .side-panel {
            z-index: 1000;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.85);
        }

        .doctor-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .doctor-card:hover {
            transform: translateY(-4px);
            background: white;
            border-color: #e2e8f0;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
        }

        /* Ocultar barra de scroll pero mantener funcionalidad */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">

    <!-- BARRA LATERAL IZQUIERDA -->
    <div class="side-panel absolute top-6 left-6 bottom-6 w-96 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col border border-white/50">
        
        <!-- Header del Usuario -->
        <div class="p-6 bg-white/50 border-b border-slate-100">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800">Hola, Paciente</h2>
                        <p class="text-xs text-green-600 font-semibold"><i class="fas fa-circle text-[8px] mr-1"></i> Ubicación activa</p>
                    </div>
                </div>
                <button onclick="location.href='index.html'" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>

            <!-- Buscador de Especialidades -->
            <div class="mt-6 relative">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" placeholder="¿Qué especialista buscas?" 
                    class="w-full pl-11 pr-4 py-3 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-sm font-medium text-slate-600">
            </div>
        </div>

        <!-- LISTA DE DOCTORES CERCANOS -->
        <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar" id="doctor-list">
            <!-- Se llena con JS -->
        </div>

        <!-- Footer del Panel -->
        <div class="p-6 bg-white border-t border-slate-100">
            <button class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-slate-800 transition-all active:scale-[0.98]">
                Solicitar Urgencia Ahora
            </button>
        </div>
    </div>

    <!-- MAPA -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Configuración inicial del mapa (Centrado en una ubicación ficticia o real)
        const map = L.map('map', {
            zoomControl: false // Ocultamos controles para que sea más limpio
        }).setView([19.4326, -99.1332], 14);

        // Capa de mapa estilo minimalista (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap'
        }).addTo(map);

        // 2. Datos simulados de doctores
        const doctores = [
            { id: 1, nombre: "Dr. Roberto Gómez", esp: "Médico General", rating: 4.9, dist: "1.2 km", lat: 19.435, lng: -99.140, img: "https://i.pravatar.cc/150?u=1" },
            { id: 2, nombre: "Dra. Ana Valadez", esp: "Pediatría", rating: 4.8, dist: "2.5 km", lat: 19.440, lng: -99.130, img: "https://i.pravatar.cc/150?u=2" },
            { id: 3, nombre: "Dr. Luis Herrera", esp: "Urgencias", rating: 4.7, dist: "0.8 km", lat: 19.428, lng: -99.135, img: "https://i.pravatar.cc/150?u=3" }
        ];

        // 3. Renderizar doctores en la lista y en el mapa
        const listContainer = document.getElementById('doctor-list');

        doctores.forEach(doc => {
            // Añadir Marcador al Mapa
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color: #2563eb; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-center: center; border: 3px solid white; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);"><i class="fas fa-user-md text-white"></i></div>`,
                iconSize: [40, 40],
                iconAnchor: [20, 40]
            });

            L.marker([doc.lat, doc.lng], { icon: customIcon }).addTo(map)
             .bindPopup(`<b>${doc.nombre}</b><br>${doc.esp}`);

            // Añadir Card a la lista lateral
            const card = document.createElement('div');
            card.className = "doctor-card p-4 rounded-3xl cursor-pointer flex items-center space-x-4";
            card.onclick = () => map.flyTo([doc.lat, doc.lng], 16);
            
            card.innerHTML = `
                <img src="${doc.img}" class="w-14 h-14 rounded-2xl object-cover shadow-sm">
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-sm">${doc.nombre}</h3>
                    <p class="text-xs text-slate-500 font-medium">${doc.esp}</p>
                    <div class="flex items-center mt-1 space-x-2">
                        <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold">
                            <i class="fas fa-star mr-1"></i>${doc.rating}
                        </span>
                        <span class="text-[10px] text-slate-400 font-bold">
                            <i class="fas fa-map-marker-alt mr-1"></i>${doc.dist}
                        </span>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            `;
            listContainer.appendChild(card);
        });

        // 4. Simulación de movimiento (El toque "millonario")
        // Mueve al Dr. Luis Herrera ligeramente cada 3 segundos
        setInterval(() => {
            doctores[2].lat += 0.0001;
            doctores[2].lng += 0.0001;
            // En una app real, aquí actualizarías el marcador en el mapa
        }, 3000);

    </script>
</body>
</html>
