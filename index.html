<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocOnDemand | Healthcare On-Demand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.5s ease; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-focus {
            transition: all 0.3s ease;
        }
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.3);
        }
        .btn-animate {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-animate:active { transform: scale(0.95); }
        
        /* Animación de entrada */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: slideUp 0.6s ease-out; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-6">

    <!-- Decoración de fondo minimalista -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-100 rounded-full blur-[120px] opacity-50"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-100 rounded-full blur-[120px] opacity-50"></div>
    </div>

    <div class="glass-card p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] w-full max-w-md animate-fade-up">
        
        <!-- Header con Animación de Icono -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 mb-6 transform rotate-12 hover:rotate-0 transition-transform duration-500">
                <i class="fas fa-stethoscope text-white text-2xl"></i>
            </div>
            <h1 id="title" class="text-3xl font-bold text-slate-900 tracking-tight">Bienvenido</h1>
            <p id="subtitle" class="text-slate-500 mt-2 font-medium">Gestiona tu salud con un toque.</p>
        </div>

        <!-- Selector de Rol Segmentado -->
        <div class="relative bg-slate-100 p-1.5 rounded-2xl flex mb-8">
            <div id="selector-bg" class="absolute top-1.5 left-1.5 w-[calc(50%-6px)] h-[calc(100%-12px)] bg-white rounded-xl shadow-sm transition-all duration-300 ease-out"></div>
            <button onclick="switchRole('paciente')" class="relative z-10 flex-1 py-2.5 text-sm font-semibold text-blue-600 transition-colors duration-300" id="tab-paciente">Paciente</button>
            <button onclick="switchRole('doctor')" class="relative z-10 flex-1 py-2.5 text-sm font-semibold text-slate-500 transition-colors duration-300" id="tab-doctor">Médico</button>
        </div>

        <!-- Formularios con transiciones -->
        <div id="form-container" class="space-y-5">
            
            <!-- Login Form (Default) -->
            <div id="login-fields" class="space-y-4">
                <div class="space-y-1">
                    <input type="email" placeholder="Email" class="w-full px-5 py-4 bg-slate-50 border-transparent rounded-2xl outline-none input-focus border focus:border-blue-200 transition-all text-slate-700">
                </div>
                <div class="space-y-1">
                    <input type="password" placeholder="Contraseña" class="w-full px-5 py-4 bg-slate-50 border-transparent rounded-2xl outline-none input-focus border focus:border-blue-200 transition-all text-slate-700">
                </div>
                <button onclick="simulateAction('Iniciando sesión...')" class="btn-animate w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-200 transition-all mt-4">
                    Entrar
                </button>
            </div>

            <!-- Botón de Registro que redirige -->
            <div class="pt-6 border-t border-slate-100 text-center">
                <span class="text-slate-400 text-sm font-medium">¿Nuevo en la plataforma?</span>
                <button onclick="redirectToRegister()" class="block w-full mt-4 py-3 border-2 border-slate-200 hover:border-blue-500 hover:text-blue-600 text-slate-600 font-bold rounded-2xl transition-all btn-animate">
                    Crear cuenta profesional
                </button>
            </div>
        </div>

        <!-- Footer legal/soporte -->
        <div class="mt-10 text-center">
            <p class="text-[11px] text-slate-400 px-6">Al continuar, aceptas nuestros términos de servicio y políticas de privacidad médica.</p>
        </div>
    </div>

    <script>
        let currentRole = 'paciente';

        function switchRole(role) {
            currentRole = role;
            const selector = document.getElementById('selector-bg');
            const tabP = document.getElementById('tab-paciente');
            const tabD = document.getElementById('tab-doctor');
            const title = document.getElementById('title');

            if (role === 'paciente') {
                selector.style.left = '6px';
                tabP.classList.add('text-blue-600');
                tabP.classList.remove('text-slate-500');
                tabD.classList.add('text-slate-500');
                tabD.classList.remove('text-blue-600');
                title.innerText = "Hola, Paciente";
            } else {
                selector.style.left = 'calc(50%)';
                tabD.classList.add('text-blue-600');
                tabD.classList.remove('text-slate-500');
                tabP.classList.add('text-slate-500');
                tabP.classList.remove('text-blue-600');
                title.innerText = "Panel Médico";
            }
        }

        function redirectToRegister() {
            // Animación de salida antes de cambiar de página
            document.querySelector('.glass-card').style.opacity = '0';
            document.querySelector('.glass-card').style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                if (currentRole === 'paciente') {
                    window.location.href = "registerClient.html";
                } else {
                    window.location.href = "registerDoctor.html";
                }
            }, 400);
        }

function simulateAction(msg) {
    const btn = event.target;
    const originalText = btn.innerHTML;
    
    // Evitar múltiples clics
    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-circle-notch animate-spin mr-2"></i> ${msg}`;
    
    // Simulamos una carga de 1.5 segundos y luego entramos
    setTimeout(() => {
        // Esto redirige a la página principal del mapa
        window.location.href = "main.html";
    }, 1500);
}
    </script>
</body>
</html>
